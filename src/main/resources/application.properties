# ===============================
# Application
# ===============================
spring.application.name=library-management-system
server.port=8080

# ===============================
# MySQL Database
# ===============================
# Create database first: CREATE DATABASE library_db;
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
# update = create/update tables automatically (good for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Loan fine (business rule)
# ===============================
library.fine.per-day=10
